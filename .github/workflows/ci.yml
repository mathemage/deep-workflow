name: CI

on:
  push:
    branches:
      - main
      - "chore/**"
      - "feat/**"
      - "docs/**"
      - "fix/**"
      - "refactor/**"
      - "style/**"
      - "test/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: deep_workflow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deep_workflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/deep_workflow
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ci-secret-key

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Django checks
        run: |
          python manage.py migrate --noinput
          python manage.py check

      - name: Test
        run: pytest
